name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish app
        run: dotnet publish .\SleepSentinel.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true

      - name: Package publish output
        shell: pwsh
        run: |
          $publishDir = "bin\Release\net8.0-windows\win-x64\publish"
          $zipPath = "SleepSentinel-win-x64.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "$publishDir\*" -DestinationPath $zipPath

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SleepSentinel-win-x64
          path: SleepSentinel-win-x64.zip

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: SleepSentinel-win-x64.zip
          generate_release_notes: true
