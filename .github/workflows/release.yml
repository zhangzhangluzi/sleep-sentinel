name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Resolve Version
        id: version
        shell: pwsh
        run: |
          [xml]$project = Get-Content ".\SleepSentinel.csproj"
          $appVersion = $project.Project.PropertyGroup.Version
          "app_version=$appVersion" >> $env:GITHUB_OUTPUT
          "installer_name=SleepSentinel-Setup-v$appVersion-win-x64.exe" >> $env:GITHUB_OUTPUT
          "portable_name=SleepSentinel-v$appVersion-win-x64.exe" >> $env:GITHUB_OUTPUT

      - name: Publish app
        run: dotnet publish .\SleepSentinel.csproj -c Release -r win-x64 --self-contained false /p:PublishSingleFile=true

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=${{ steps.version.outputs.app_version }}" ".\SleepSentinel.iss"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.installer_name }}
          path: installer/${{ steps.version.outputs.installer_name }}

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.portable_name }}
          path: bin/Release/net8.0-windows/win-x64/publish/${{ steps.version.outputs.portable_name }}

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $files = @(
            "installer/${{ steps.version.outputs.installer_name }}",
            "bin/Release/net8.0-windows/win-x64/publish/${{ steps.version.outputs.portable_name }}"
          )

          gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $files --clobber --repo $repo
          }
          else {
            gh release create $tag $files --generate-notes --repo $repo
          }
