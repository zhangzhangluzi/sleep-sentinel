name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish app
        run: dotnet publish .\SleepSentinel.csproj -c Release -r win-x64 --self-contained false /p:PublishSingleFile=true

      - name: Package publish output
        shell: pwsh
        run: |
          $publishDir = "bin\Release\net8.0-windows\win-x64\publish"
          $zipPath = "SleepSentinel-win-x64.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "$publishDir\*" -DestinationPath $zipPath

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" ".\SleepSentinel.iss"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SleepSentinel-win-x64
          path: SleepSentinel-win-x64.zip

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SleepSentinel-Setup-win-x64
          path: installer/SleepSentinel-Setup-win-x64.exe

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $files = @(
            "bin/Release/net8.0-windows/win-x64/publish/SleepSentinel.exe",
            "SleepSentinel-win-x64.zip",
            "installer/SleepSentinel-Setup-win-x64.exe"
          )

          gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $files --clobber --repo $repo
          }
          else {
            gh release create $tag $files --generate-notes --repo $repo
          }
